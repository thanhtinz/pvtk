<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Phong Vân Online — Kiếm Hiệp Huyền Thoại</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body class="portal">
  <header class="site">
    <img class="badge18-img" src="/img/badge-18.gif" alt="18+"/>
    <a href="#home"><img class="brand-logo" src="/img/logo-dragon.png" alt="Phong Vân Truyền Kỳ"/></a>
    <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
    <div class="header-menu" id="headerMenu">
      <nav id="nav">
        <a data-view="home" class="active">Trang chủ</a>
        <a data-view="news">Tin tức</a>
        <a data-view="leaderboard">BXH</a>
        <a data-view="shop">Webshop</a>
        <a data-view="topup">Nạp thẻ</a>
        <a data-view="giftcode">Giftcode</a>
        <a data-view="profile" class="auth-only hidden">Cá nhân</a>
      </nav>
      <div class="userbox" id="userbox">
        <a class="btn small" id="loginBtn">Đăng nhập</a>
        <a class="btn small sec" id="registerBtn">Đăng ký</a>
      </div>
    </div>
  </header>

  <main id="app"></main>

  <footer class="site">
    <div class="foot-icons">
      <a onclick="go('giftcode')"><span class="fic">🎁</span>GIFTCODE</a>
      <a onclick="go('topup')"><span class="fic">💳</span>NẠP THẺ</a>
      <a onclick="showDownload()"><span class="fic">⬇️</span>TẢI GAME</a>
      <a onclick="go('news')"><span class="fic">📖</span>HƯỚNG DẪN</a>
      <a href="#" onclick="return false"><span class="fic">📘</span>FACEBOOK</a>
    </div>
    <div class="logo">⚔ PHONG VÂN ONLINE</div>
    <div class="foot-links">Điều khoản sử dụng · Cài đặt và gỡ bỏ · Bảo mật · Thanh toán</div>
    <div style="margin-top:8px">© 2024 Phong Vân Online · Server cộng đồng · Chơi miễn phí</div>
  </footer>

  <div id="toast"></div>
  <div id="modal-root"></div>

  <script src="/app.js"></script>
</body>
</html>
